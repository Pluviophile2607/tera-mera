<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TeraMera User Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&amp;family=Space+Grotesk:wght@400..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#006262",
                        "secondary-container": "#ffd709",
                        "secondary-fixed-dim": "#efc900",
                        "on-error-container": "#570008",
                        "error-dim": "#9f0519",
                        "on-tertiary-container": "#601400",
                        "on-secondary-fixed-variant": "#665500",
                        "on-tertiary": "#ffefec",
                        "on-surface-variant": "#5a5c5c",
                        "error": "#b31b25",
                        "inverse-surface": "#0c0f0f",
                        "surface-tint": "#006666",
                        "primary-fixed-dim": "#67e1e1",
                        "secondary-fixed": "#ffd709",
                        "on-secondary-container": "#5b4b00",
                        "inverse-primary": "#76efef",
                        "on-primary-container": "#005858",
                        "surface-bright": "#f6f6f6",
                        "inverse-on-surface": "#9c9d9d",
                        "surface-dim": "#d2d5d5",
                        "on-background": "#2d2f2f",
                        "on-error": "#ffefee",
                        "tertiary-fixed": "#ff9476",
                        "on-primary-fixed": "#004343",
                        "surface-container-high": "#e1e3e3",
                        "tertiary-container": "#ff9476",
                        "outline": "#757777",
                        "tertiary-dim": "#972500",
                        "primary-fixed": "#76efef",
                        "on-tertiary-fixed": "#350700",
                        "background": "#f6f6f6",
                        "on-primary": "#bbfffe",
                        "tertiary": "#ac2c00",
                        "on-secondary-fixed": "#453900",
                        "primary-dim": "#005959",
                        "on-tertiary-fixed-variant": "#701900",
                        "secondary": "#6c5a00",
                        "surface-container": "#e7e8e8",
                        "surface": "#f6f6f6",
                        "surface-container-highest": "#dbdddd",
                        "tertiary-fixed-dim": "#ff7d58",
                        "error-container": "#fb5151",
                        "surface-container-lowest": "#ffffff",
                        "secondary-dim": "#5e4e00",
                        "on-secondary": "#fff2cd",
                        "surface-container-low": "#f0f1f1",
                        "outline-variant": "#acadad",
                        "on-surface": "#2d2f2f",
                        "primary-container": "#76efef",
                        "surface-variant": "#dbdddd",
                        "primary": "#006666"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "0px"
                    },
                    "fontFamily": {
                        "display": ["Bricolage Grotesque", "sans-serif"],
                        "headline": ["Bricolage Grotesque", "sans-serif"],
                        "body": ["Space Grotesk", "sans-serif"],
                        "label": ["Space Grotesk", "sans-serif"]
                    },
                    "boxShadow": {
                        'brutal': '4px 4px 0px 0px #757777',
                        'brutal-hover': '2px 2px 0px 0px #757777',
                        'brutal-active': '0px 0px 0px 0px #757777'
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .brutal-border {
            border: 3px solid #757777;
        }
        .brutal-shadow {
            box-shadow: 4px 4px 0px 0px #757777;
            transition: all 0.1s ease;
        }
        .brutal-shadow:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px #757777;
        }
        .brutal-shadow:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px #757777;
        }
        .glass-nav {
            background-color: rgba(118, 239, 239, 0.7);
            backdrop-filter: blur(20px);
        }
        .bg-pattern {
            background-image: radial-gradient(var(--tw-colors-outline-variant) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen overflow-x-hidden bg-pattern">
<!-- Top Navigation (Shared Component Integration) -->
<header class="flex items-center justify-between whitespace-nowrap border-b-4 border-outline bg-surface-container-lowest px-10 py-4 sticky top-0 z-50">
<div class="flex items-center gap-8">
<div class="flex items-center gap-4 text-on-surface">
<div class="size-8 text-primary">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.1739 20.1739L27.8261 5.82609C29.1366 7.13663 28.3989 10.1876 26.2002 13.7654C24.8538 15.9564 22.9595 18.3449 20.6522 20.6522C18.3449 22.9595 15.9564 24.8538 13.7654 26.2002C10.1876 28.3989 7.13663 29.1366 5.82609 27.8261L20.1739 42.1739C21.4845 43.4845 24.5355 42.7467 28.1133 40.548C30.3042 39.2016 32.6927 37.3073 35 35C37.3073 32.6927 39.2016 30.3042 40.548 28.1133C42.7467 24.5355 43.4845 21.4845 42.1739 20.1739Z"></path>
</svg>
</div>
<h2 class="font-display text-2xl font-black uppercase tracking-tighter">TeraMera</h2>
</div>
<nav class="flex items-center gap-9 hidden md:flex">
<a class="text-on-surface font-display text-lg font-bold bg-secondary-container px-2 border-b-4 border-outline" href="#">Dashboard</a>
<a class="text-on-surface font-display text-lg font-medium hover:text-primary transition-colors" href="#">Community</a>
<a class="text-on-surface font-display text-lg font-medium hover:text-primary transition-colors" href="#">Messages</a>
</nav>
</div>
<div class="flex flex-1 justify-end gap-6 items-center">
<div class="relative hidden sm:block w-64 brutal-border bg-surface-container-highest focus-within:bg-primary-container transition-colors">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface">search</span>
<input class="w-full bg-transparent pl-10 pr-4 py-2 font-body font-bold text-on-surface placeholder:text-on-surface-variant focus:outline-none" placeholder="Search neighborhood..." type="text"/>
</div>
<div class="size-12 brutal-border brutal-shadow bg-surface-container-low overflow-hidden cursor-pointer">
<img alt="Profile" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all" data-alt="Portrait of a young person smiling softly in a brutalist urban setting with harsh lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBkY6qrVAcT_c2zOalxTjHHpoYoBj4WLb2JqZywzlvhZM0CI6jG4k1dGOIzMH2yFgJHfwQM9fnMsXFzFOzmJ5_gZHxvlvrdxPNgXqReBFd3Pg0pQ2E3SNcacr_KistabSdrbCOYUzBYSjHGt3LLkYdgsLlCg-DSROYuB2RtpFioHuMgUwYNbnd_Jzno-dkHM72uh1F3E-E6j2AIPqP6c3Xmv6mpLcuBBp2K_qU5Xp4e9gxqSwC6o5EJY36WPZo98y3u51xQhc2fKA"/>
</div>
</div>
</header>
<div class="flex flex-col lg:flex-row max-w-[1440px] mx-auto p-4 lg:p-8 gap-8 relative">
<!-- Main Content Area -->
<main class="flex-1 flex flex-col gap-12">
<!-- Quick Action Hub (Moved up for emphasis in Brutalism) -->
<section class="flex flex-col sm:flex-row gap-6 relative z-10">
<button class="flex-1 group brutal-border brutal-shadow bg-primary p-6 text-left relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary to-primary-container opacity-50 group-hover:opacity-100 transition-opacity"></div>
<div class="relative z-10 flex flex-col gap-4">
<span class="material-symbols-outlined text-on-primary text-5xl font-light">add_box</span>
<div>
<h3 class="font-display text-3xl font-black text-on-primary uppercase tracking-tighter">Post a Tera</h3>
<p class="font-body text-on-primary font-medium mt-1">Offer an item to the neighborhood</p>
</div>
</div>
</button>
<button class="flex-1 group brutal-border brutal-shadow bg-secondary-container p-6 text-left relative overflow-hidden">
<div class="relative z-10 flex flex-col gap-4">
<span class="material-symbols-outlined text-on-secondary-container text-5xl font-light">campaign</span>
<div>
<h3 class="font-display text-3xl font-black text-on-secondary-container uppercase tracking-tighter">Broadcast Mera</h3>
<p class="font-body text-on-secondary-container font-medium mt-1">Request something you need</p>
</div>
</div>
</button>
</section>
<!-- Impact Summary Banner -->
<section class="flex flex-col gap-4">
<h2 class="font-display text-4xl font-black text-on-surface uppercase tracking-[-0.02em] inline-block bg-primary-container px-3 py-1 brutal-border shadow-[4px_4px_0_0_#757777] self-start">Impact Status</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="brutal-border brutal-shadow bg-surface-container-lowest p-6 flex flex-col gap-2 relative">
<span class="material-symbols-outlined text-tertiary-fixed absolute top-4 right-4 text-3xl">eco</span>
<p class="font-body text-on-surface-variant font-bold uppercase tracking-wider text-sm">Carbon Saved</p>
<p class="font-display text-5xl font-black text-on-surface tracking-tighter">12.4<span class="text-2xl text-on-surface-variant">kg</span></p>
</div>
<div class="brutal-border brutal-shadow bg-surface-container-lowest p-6 flex flex-col gap-2 relative">
<span class="material-symbols-outlined text-primary-fixed absolute top-4 right-4 text-3xl">group</span>
<p class="font-body text-on-surface-variant font-bold uppercase tracking-wider text-sm">Neighbors Helped</p>
<p class="font-display text-5xl font-black text-on-surface tracking-tighter">8</p>
</div>
<div class="brutal-border brutal-shadow bg-secondary-container p-6 flex flex-col gap-2 relative">
<span class="material-symbols-outlined text-on-secondary-container absolute top-4 right-4 text-3xl">bolt</span>
<p class="font-body text-on-secondary-container font-bold uppercase tracking-wider text-sm">Karma Score</p>
<p class="font-display text-5xl font-black text-on-secondary-container tracking-tighter">1,450</p>
</div>
</div>
</section>
</main>
</div>
</body></html>
